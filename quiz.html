<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Kuis - English Quiz</title>
    
    <!-- Link ke CSS terpisah -->
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

    <button id="sound-toggle-btn" onclick="toggleSound()">🔇 SOUND OFF</button>

    <div class="container">
        <!-- 1. LOBBY -->
        <div id="waiting-screen">
            <h2 style="margin: 0;">Hi, <span id="player-name-display">Siswa</span>! 👋</h2>
            <p style="color: #718096;">Kamu sudah masuk di Room</p>
            <div class="spinner"></div>
            <p style="font-weight: bold; color: #4a5568; margin-bottom: 25px;">Menunggu mentormu memulai kuis...</p>
            <div style="border-top: 2px dashed #e2e8f0; padding-top: 15px;">
                <p style="font-size: 14px; color: #718096; margin: 0;">👥 Teman yang sudah bergabung: <strong id="lobby-player-count">0</strong></p>
                <div id="lobby-player-list" class="player-chips"></div>
            </div>
        </div>

        <!-- 2. LAYAR KUIS -->
        <div id="game-screen">
            <div class="meta-info">
                <span>Soal <span id="question-number">1</span></span>
                <span id="question-category" class="category-badge">KATEGORI</span>
                <span style="color: #3182ce;">Skor: <span id="score-display">0</span></span>
            </div>
            
            <div class="timer-wrap">
                <div class="timer-angka" id="timer-angka">20</div>
                <div class="timer-container"><div id="timer-bar"></div></div>
            </div>

            <div id="question-text" class="question-box">Memuat soal...</div>

            <div class="choices-grid">
                <button class="choice-btn" id="btn-a" onclick="submitJawaban('a')">A. <span id="text-a"></span></button>
                <button class="choice-btn" id="btn-b" onclick="submitJawaban('b')">B. <span id="text-b"></span></button>
                <button class="choice-btn" id="btn-c" onclick="submitJawaban('c')">C. <span id="text-c"></span></button>
                <button class="choice-btn" id="btn-d" onclick="submitJawaban('d')">D. <span id="text-d"></span></button>
            </div>
            <div id="feedback-text"></div>
            <div class="leaderboard-box">
                <h4>🏆 KLASEMEN SEMENTARA</h4>
                <ul id="live-leaderboard"></ul>
            </div>
        </div>

        <!-- 3. PODIUM AKHIR -->
        <div id="final-screen">
            <div class="trophy">🏆</div>
            <h2 style="margin:0; color:#2d3748;">Kuis Berakhir!</h2>
            <p style="color:#718096; font-size:14px;">Terima kasih atas partisipasinya. Ini dia hasil akhirnya:</p>
            <ul id="final-leaderboard"></ul>
        </div>
    </div>

    <!-- Link ke Javascript terpisah -->
    <script type="module" src="quiz.js"></script>
</body>
</html>
