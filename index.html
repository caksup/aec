<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quiz Arena</title>
    <style>
        /* Gaya dasar agar terlihat modern dan rapi di HP */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 85%;
            max-width: 350px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #4a5568;
        }
        p {
            font-size: 14px;
            color: #718096;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 15px 0;
            text-indent: 15px;
            margin-bottom: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #667eea;
        }
        #pin-input {
            text-align: center;
            text-indent: 0;
            letter-spacing: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background 0.3s;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 English Quiz</h1>
        <p>Masukkan Nickname dan PIN dari mentormu!</p>
        
        <input type="text" id="nama-input" placeholder="Nama Panggilanmu" required autocomplete="off">
        <input type="text" id="pin-input" placeholder="PIN KUIS" maxlength="6" required autocomplete="off">
        
        <button id="join-btn">JOIN SEKARANG</button>
    </div>

    <!-- Script Firebase Sistem Modular -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        // Konfigurasi Proyek Anda
        const firebaseConfig = {
            apiKey: "AIzaSyA3DQxHV4jtSrvSymQLZ_sNPgM4PwpvpN0",
            authDomain: "quiz-eng-multiplayer.firebaseapp.com",
            databaseURL: "https://quiz-eng-multiplayer-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "quiz-eng-multiplayer",
            storageBucket: "quiz-eng-multiplayer.firebasestorage.app",
            messagingSenderId: "573917472854",
            appId: "1:573917472854:web:e1f9f9371fb0c4295433f7"
        };

        // Inisialisasi Firebase & Database
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Logika saat tombol Join diklik
        document.getElementById('join-btn').addEventListener('click', async () => {
            const btn = document.getElementById('join-btn');
            const nama = document.getElementById('nama-input').value.trim();
            const pin = document.getElementById('pin-input').value.trim().toUpperCase();

            if (nama === "" || pin === "") {
                alert("Hei! Nama dan PIN tidak boleh kosong 😅");
                return;
            }

            // Ubah tampilan tombol saat proses loading
            btn.innerText = "MENGHUBUNGKAN...";
            btn.disabled = true;

            try {
                // Membuat jalur data di Firebase: sessions -> PIN KUIS -> players -> NAMA SISWA
                const playerRef = ref(db, 'sessions/' + pin + '/players/' + nama);
                
                // Menyimpan nama siswa dan memberikan skor awal 0
                await set(playerRef, {
                    skor: 0,
                    status: "menunggu"
                });

                alert("✅ Berhasil masuk! Menunggu mentor memulai kuis...");
                
                // Catatan: Nanti di sini kita akan tambahkan kode untuk pindah ke halaman kuis
                
            } catch (error) {
                alert("❌ Gagal terhubung! Pastikan koneksi internet lancar.");
                console.error(error);
            } finally {
                // Kembalikan status tombol seperti semula
                btn.innerText = "JOIN SEKARANG";
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
