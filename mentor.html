<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mentor - English Quiz</title>
    <link rel="stylesheet" href="mentor.css">
    <script>
        const PASSWORD_RAHASIA = "aecmentor"; 
        const inputSandi = prompt("🔒 Halaman Khusus Mentor.\nMasukkan Password Anda:");
        if (inputSandi !== PASSWORD_RAHASIA) { alert("❌ Password Salah! Akses Ditolak."); window.location.href = "index.html"; }
    </script>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="tab-live-btn" onclick="switchTab('live-quiz')">🔴 LIVE</button>
            <button class="tab-btn" id="tab-soal-btn" onclick="switchTab('buat-soal')">📝 SOAL</button>
            <button class="tab-btn" id="tab-bank-btn" onclick="switchTab('bank-soal')">📚 BANK</button>
            <button class="tab-btn" id="tab-riwayat-btn" onclick="switchTab('riwayat-kuis')">🕒 SESI</button>
            <button class="tab-btn" id="tab-pemain-btn" onclick="switchTab('riwayat-pemain')">👥 PEMAIN</button>
        </div>
        
        <div id="live-quiz" class="tab-content active">
            <div id="setup-section" class="card">
                <p style="margin:0; color:#718096;">PIN Sesi Kuis Anda</p>
                <div id="pin-text" class="pin-display">- - - - - -</div>
                <button id="create-session-btn" class="btn-primary">BUAT SESI BARU</button>
            </div>
            <div id="lobby-section" style="display: none;">
                <div class="card" style="background: #ebf8ff; border: 2px dashed #3182ce;">
                    <p style="margin:0; color:#4a5568; font-weight: bold;">📢 BAGIKAN PIN INI KE SISWA:</p>
                    <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin: 10px 0;">
                        <div id="lobby-pin-text" class="pin-display" style="color: #2b6cb0; margin: 0;">- - - - - -</div>
                        <button onclick="salinTeks('lobby-pin-text')" class="btn-dark btn-small">📋 Salin</button>
                    </div>
                </div>
                <h3>Siswa di Ruang Tunggu (<span id="player-count">0</span>)</h3>
                <ul id="player-list"></ul>
                <button id="start-quiz-btn" class="btn-success" style="margin-top: 20px;" disabled>MULAI KUIS 🚀</button>
            </div>

            <div id="control-section" style="display: none;">
                <div class="card" style="background: #edf2f7; padding: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: bold;">PIN: <span id="active-pin-text" style="color:#3182ce; font-size: 18px;">-</span></span>
                    <button onclick="salinTeks('active-pin-text')" class="btn-dark btn-small" style="margin:0;">📋 Salin</button>
                </div>
                <h3>📖 Soal Aktif Saat Ini:</h3>
                <div id="active-question-display" class="active-question-box">Memuat teks soal...</div>
                <h3>🏆 Papan Skor Realtime</h3>
                <ul id="leaderboard-list"></ul>
                <div style="margin-top: 25px;">
                    <button id="end-quiz-btn" class="btn-danger">AKHIRI KUIS 🏁</button>
                </div>
            </div>

            <div id="final-section" style="display: none; text-align: center; padding-top: 20px;">
                <div style="font-size: 60px; margin-bottom: 10px;">🏆</div>
                <h2 style="margin:0; color:#2d3748;">Kuis Berakhir!</h2>
                <ul id="final-leaderboard" class="podium-list" style="margin-top:20px; text-align:left;"></ul>
                <button onclick="location.reload()" class="btn-success" style="margin-top: 30px;">KEMBALI KE AWAL</button>
            </div>
        </div>

        <!-- Tab lainnya tetap sama -->
        <div id="buat-soal" class="tab-content">...</div>
        <div id="bank-soal" class="tab-content">...</div>
        <div id="riwayat-kuis" class="tab-content">...</div>
        <div id="riwayat-pemain" class="tab-content">...</div>
    </div>
    <script type="module" src="mentor.js"></script>
</body>
</html>
